# Deployt die Seite bei jedem Push auf main zu GitHub Pages
# (Voraussetzung: Settings -> Pages -> Source: "GitHub Actions").
# Der woechentliche Auto-Refresh deployt NICHT ueber diesen Workflow (Bot-Pushes
# mit GITHUB_TOKEN loesen keine Push-Workflows aus), sondern ueber den
# deploy-Job in refresh.yml.
name: pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-pages-artifact@v3
        with: { path: "." }
      - uses: actions/deploy-pages@v4
