# Woechentlicher Verfuegbarkeits-Refresh: holt Live-Daten von morenutrition.de,
# regeneriert index.html und committet das Ergebnis. Aktiv, sobald das Repo auf
# GitHub liegt (Settings -> Actions erlauben). Fuer GitHub Pages zusaetzlich
# Settings -> Pages -> Source: "GitHub Actions" waehlen.
# Der Deploy-Job unten ist noetig, weil der Bot-Push mit GITHUB_TOKEN den
# Push-Workflow (pages.yml) NICHT ausloest — der woechentliche Refresh deployt
# deshalb hier selbst.
name: refresh

on:
  schedule:
    - cron: "0 6 * * 1"   # montags 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Refresh Verfuegbarkeit + Regeneration
        run: python refresh.py
      - name: Commit bei Aenderungen
        run: |
          git config user.name "refresh-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Auto-Refresh Verfuegbarkeit ($(date -u +%F))"
          git push

  deploy:
    needs: refresh
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with: { ref: main }
      - uses: actions/upload-pages-artifact@v3
        with: { path: "." }
      - uses: actions/deploy-pages@v4
